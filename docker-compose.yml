
services:
  django-api:
    build: .
    command: >
      gunicorn products.wsgi:application
      --bind 0.0.0.0:8000
      --workers 2
      --worker-tmp-dir /dev/shm
    volumes:
      - .:/app
      - static_content:/app/staticfiles
    ports:
      - 8000:8000
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: bpims-prod
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # nginx:
  #     image: nginx:alpine
  #     volumes:
  #       - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #       - static_content:/app/staticfiles:ro
  #     ports:
  #       - "80:80"
  #     depends_on:
  #       - django-api

volumes:
  postgres_data:
  static_content:

networks:
  backend-network:
    external: true